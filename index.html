<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TNTSim — 3D Blast Physics Simulator</title>
<style>
:root{--bg:#0a0a0c;--s1:#111116;--s2:#16161d;--bd:#1e1e2a;--tx:#c8c8d4;--td:#6a6a7a;--ac:#ff3b30;--ag:#ff6b4a;--fm:'Courier New',monospace;--fs:system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0c;color:var(--tx);font-family:var(--fs);overflow:hidden;height:100vh;width:100vw;user-select:none;-webkit-user-select:none}
canvas{display:block;position:absolute;inset:0}
#hud{position:absolute;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:linear-gradient(180deg,rgba(10,10,12,.95) 0%,transparent);z-index:10;pointer-events:none}
#hud>*{pointer-events:auto}
.hb{font-family:var(--fm);font-size:14px;color:var(--td);letter-spacing:2px;text-transform:uppercase}
.hb span{color:var(--ac);font-weight:700}
.hs{display:flex;gap:20px;font-family:var(--fm);font-size:12px;color:var(--td)}
.hs .v{color:var(--ag);font-weight:700}
#tb{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:4px;z-index:10;backdrop-filter:blur(12px)}
.tb{font-family:var(--fm);font-size:11px;color:var(--td);background:transparent;border:none;border-radius:7px;padding:8px 14px;cursor:pointer;transition:all .15s;letter-spacing:.5px;white-space:nowrap}
.tb:hover{background:var(--s2);color:var(--tx)}
.tb.a{background:var(--ac);color:#fff;box-shadow:0 0 12px rgba(255,59,48,.3)}
.tb .k{opacity:.4;font-size:10px}
#hp{position:absolute;top:56px;right:16px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px 18px;z-index:10;font-family:var(--fm);font-size:11px;color:var(--td);line-height:1.8;backdrop-filter:blur(12px);display:none}
#hp kbd{display:inline-block;background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:1px 6px;font-family:var(--fm);font-size:10px;color:var(--tx);margin:0 2px}
#fl{position:fixed;inset:0;background:radial-gradient(circle,rgba(255,150,0,.2) 0%,transparent 70%);pointer-events:none;z-index:2;opacity:0;transition:opacity .08s}
#fl.on{opacity:1}
#so{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
#so.on{display:flex}
#sp{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:0;width:min(520px,92vw);max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.6);display:flex;flex-direction:column}
.sh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--s1);border-radius:14px 14px 0 0;z-index:1}
.sh h3{font-family:var(--fm);font-size:14px;color:var(--tx);text-transform:uppercase;letter-spacing:2px}
.sh h3 span{color:var(--ac)}
.sc{background:var(--s2);border:1px solid var(--bd);color:var(--td);font-family:var(--fm);font-size:14px;width:32px;height:32px;border-radius:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.sc:hover{color:var(--tx);background:var(--bd)}
.sb{padding:16px 20px 20px;display:flex;flex-direction:column;gap:14px}
.sr{display:flex;align-items:center;justify-content:space-between;gap:14px}
.sl{font-family:var(--fm);font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;min-width:90px}
.sv{font-family:var(--fm);font-size:11px;color:var(--ag);font-weight:700;min-width:32px;text-align:right}
input[type=range]{-webkit-appearance:none;flex:1;height:6px;background:var(--s2);border-radius:3px;outline:none;border:1px solid var(--bd)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--ac);cursor:pointer;border:2px solid var(--s1);box-shadow:0 0 8px rgba(255,59,48,.4)}
.st{width:44px;height:24px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.st.on{background:var(--ac);border-color:var(--ac)}
.st::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s}
.st.on::after{transform:translateX(20px)}
.sn{width:56px;background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--fm);font-size:12px;padding:4px 6px;text-align:center;outline:none}
.sn:focus{border-color:var(--ac)}
.sf{padding:14px 20px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.sbtn{font-family:var(--fm);font-size:11px;padding:8px 18px;border-radius:7px;cursor:pointer;border:1px solid var(--bd);background:var(--s2);color:var(--td);letter-spacing:.5px;transition:all .15s}
.sbtn:hover{color:var(--tx)}
.sbtn.p{background:var(--ac);color:#fff;border-color:var(--ac)}
.sbtn.d{color:var(--ac)}
@media(max-width:768px){#tb{bottom:8px;gap:2px}.tb{padding:6px 10px;font-size:10px}.hs{gap:10px;font-size:10px}#hp{right:4px;top:44px;font-size:10px;padding:12px}#sp{width:95vw;max-height:90vh}.sb{gap:10px;padding:12px 14px}.sl{font-size:10px;min-width:75px}}
</style>
</head>
<body>
<div id="app"><canvas id="cv"></canvas>
<div id="hud"><div class="hb">TNT<span>SIM</span> <span style="color:#6a6a7a;font-size:10px">v1.0</span></div>
<div class="hs"><div>FUSE <span class="v" id="sf">4</span></div><div>ACTIVE <span class="v" id="sa">0</span></div><div>DETS <span class="v" id="sd">0</span></div><div>MSPT <span class="v" id="sm">0.00</span></div><div>FPS <span class="v" id="sps">60</span></div></div></div>
<div id="hp"><kbd>LMB</kbd> Place &nbsp; <kbd>RMB</kbd> Remove &nbsp; <kbd>MMB</kbd> Prime<br><kbd>Space</kbd> Run &nbsp; <kbd>R</kbd> Reset &nbsp; <kbd>.</kbd> Step<br><kbd>1-4</kbd> Block &nbsp; <kbd>[/]</kbd> Brush<br><kbd>WASD</kbd> Pan &nbsp; <kbd>QE</kbd> Rotate &nbsp; <kbd>Wheel</kbd> Zoom<br><kbd>G</kbd> Grid &nbsp; <kbd>+-</kbd> Speed &nbsp; <kbd>H</kbd> Help</div>
<div id="so"><div id="sp"><div class="sh"><h3>SET<span>TINGS</span></h3><button class="sc" id="bsc">X</button></div><div class="sb" id="sb"></div><div class="sf"><button class="sbtn d" id="bra">RESET ALL</button><button class="sbtn p" id="bap">APPLY</button></div></div></div>
<div id="tb"><button class="tb a" data-blk="1">STONE <span class="k">1</span></button><button class="tb" data-blk="2">TNT <span class="k">2</span></button><button class="tb" data-blk="3">OBSIDIAN <span class="k">3</span></button><button class="tb" data-blk="4">BEDROCK <span class="k">4</span></button><button class="tb" id="brun">▶ RUN</button><button class="tb" id="brst">↺ RST</button><button class="tb" id="bset">⚙ SET</button><button class="tb" id="bh">? HELP</button></div>
<div id="fl"></div></div>
<script>
"use strict";
var cv=document.getElementById("cv"),ctx=cv.getContext("2d"),fl=document.getElementById("fl"),hp=document.getElementById("hp");
var T={AIR:0,STONE:1,TNT:2,OBSIDIAN:3,BEDROCK:4};
var COLORS={1:"#5a5a6e",2:"#d42020",3:"#2a1550",4:"#1a1a24"};
var S={gw:40,gh:30,cs:24,pwr:4,fuse:4,chain:true,brush:1,ivl:0.4,grid:true};
var DF=JSON.parse(JSON.stringify(S));
var nrb=false,grid=[],ent=[],par=[];
var tc=0,tdet=0,bd=0,run=false,tt=0,mspt=0,cb=1,nid=1;
var keys={};

// Isometric camera
var cx=0,cy=0,zoom=1,tcx=0,tcy=0;

// Isometric projection
var COSA=Math.cos(Math.PI/6),SINA=Math.sin(Math.PI/6);
function iso(x,y,z){return{x:(x-y)*COSA*S.cs*zoom+cx,y:(x+y)*SINA*S.cs*zoom-z*S.cs*zoom+cy}}

function initGrid(){
  grid=Array.from({length:S.gh},function(){return new Array(S.gw).fill(0)});
  for(var x=0;x<S.gw;x++)grid[S.gh-1][x]=4;
}
function ib(x,y){return x>=0&&x<S.gw&&y>=0&&y<S.gh}
function pb(x,y,t){if(ib(x,y)&&grid[y][x]===0)grid[y][x]=t}
function pbr(x,y,t){var b=S.brush;for(var dy=-b+1;dy<b;dy++)for(var dx=-b+1;dx<b;dx++)pb(x+dx,y+dy,t)}
function rb(x,y){if(ib(x,y)&&grid[y][x]!==0)grid[y][x]=0}
function prime(x,y){if(ib(x,y)&&grid[y][x]===2){grid[y][x]=0;ent.push({x:x+0.5,y:y+0.5,f:S.fuse,p:S.pwr,a:true,id:nid++})}}

function calcExp(ox,oy,pw){
  var d=[],t=[],n=Math.floor(pw*4);
  for(var i=0;i<n;i++){
    var a=(i/n)*Math.PI*2+(Math.random()-0.5)*0.3;
    var dx=Math.cos(a),dz=Math.sin(a),s=pw*(0.7+Math.random()*0.6),wcx=ox,wcz=oy;
    for(var j=0;j<Math.floor(s*3);j++){
      wcx+=dx*0.5;wcz+=dz*0.5;var x=Math.floor(wcx),z=Math.floor(wcz);
      if(!ib(x,z))break;var c=grid[z][x];
      if(c===0)continue;
      if(c===2){t.push({gx:x,gy:z});grid[z][x]=0;d.push({gx:x,gy:z});break}
      if(c===1){if(s>0.5){grid[z][x]=0;d.push({gx:x,gy:z});s-=1.5;if(s<=0)break}else break}
      if(c===4){if(s>4){grid[z][x]=0;d.push({gx:x,gy:z})}break}
      if(c===3){if(s>2.5){grid[z][x]=0;d.push({gx:x,gy:z});s-=3}else break}
    }
  }
  return {d:d,t:t};
}

function spawnParts(wx,wy,pw){
  for(var i=0;i<Math.floor(pw*30);i++){
    var a=Math.random()*Math.PI*2,ph=Math.random()*Math.PI*0.4,spd=(2+Math.random()*8)*(pw/3);
    par.push({x:wx,y:wy,vx:Math.cos(a)*Math.cos(ph)*spd,vy:Math.sin(ph)*spd+1.5,vz:Math.sin(a)*Math.cos(ph)*spd,life:0.3+Math.random()*0.7,ml:1});
  }
}

function tick(){
  var t0=performance.now();tc++;
  var nx=[];
  for(var i=0;i<ent.length;i++){var e=ent[i];if(!e.a)continue;e.f--;if(e.f<=0){e.a=false;nx.push(e)}}
  ent=ent.filter(function(e){return e.a});
  var td=0,tq=[];
  for(var i=0;i<nx.length;i++){var e=nx[i],r=calcExp(Math.floor(e.x),Math.floor(e.y),e.p);tdet++;bd+=r.d.length;td+=r.d.length;spawnParts(e.x,e.y,e.p);for(var j=0;j<r.t.length;j++)tq.push(r.t[j])}
  if(td>0){fl.classList.add("on");setTimeout(function(){fl.classList.remove("on")},80)}
  if(S.chain)for(var i=0;i<tq.length;i++){var t=tq[i];ent.push({x:t.gx+0.5,y:t.gy+0.5,f:Math.max(0,S.fuse-1),p:S.pwr,a:true,id:nid++})}
  mspt=performance.now()-t0;
}

function reset(){
  ent=[];par=[];tc=0;tdet=0;bd=0;run=false;tt=0;mspt=0;nid=1;
  initGrid();document.getElementById("brun").textContent="▶ RUN";
}

function upParts(dt){
  for(var i=par.length-1;i>=0;i--){var p=par[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vz-=3*dt;p.life-=dt;if(p.life<=0)par.splice(i,1)}
}

// Draw isometric cube
var FACE_TOP=0,FACE_LEFT=1,FACE_RIGHT=2;
function drawCube(x,y,z,color,size,alpha){
  size=size||0.85;alpha=alpha||1;
  var h=size,c=color;
  var lighten=function(col,amt){
    var r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    r=Math.min(255,Math.floor(r+amt));g=Math.min(255,Math.floor(g+amt));b=Math.min(255,Math.floor(b+amt));
    return "rgb("+r+","+g+","+b+")";
  };
  var darken=function(col,amt){
    var r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
    r=Math.max(0,Math.floor(r-amt));g=Math.max(0,Math.floor(g-amt));b=Math.max(0,Math.floor(b-amt));
    return "rgb("+r+","+g+","+b+")";
  };

  var cs=S.cs*zoom;
  var cx0=x+0.5,cy0=y+0.5;
  // Top face center
  var top=iso(cx0,cy0,h);
  // Bottom face center
  var bot=iso(cx0,cy0,0);
  // Corners
  var half=size/2;
  // Top face: TL, TR, BR, BL
  var ttl=iso(cx0-half,cy0-half,h),ttr=iso(cx0+half,cy0-half,h);
  var tbr=iso(cx0+half,cy0+half,h),tbl=iso(cx0-half,cy0+half,h);
  // Bottom face
  var btl=iso(cx0-half,cy0-half,0),btr=iso(cx0+half,cy0-half,0);
  var bbr=iso(cx0+half,cy0+half,0),bbl=iso(cx0-half,cy0+half,0);

  ctx.globalAlpha=alpha;
  // Left face
  ctx.fillStyle=lighten(c,20);ctx.beginPath();
  ctx.moveTo(btl.x,btl.y);ctx.lineTo(bbl.x,bbl.y);ctx.lineTo(tbl.x,tbl.y);ctx.lineTo(ttl.x,ttl.y);ctx.closePath();ctx.fill();
  ctx.strokeStyle=darken(c,40);ctx.lineWidth=0.5;ctx.stroke();
  // Right face
  ctx.fillStyle=c;ctx.beginPath();
  ctx.moveTo(bbl.x,bbl.y);ctx.lineTo(bbr.x,bbr.y);ctx.lineTo(tbr.x,tbr.y);ctx.lineTo(tbl.x,tbl.y);ctx.closePath();ctx.fill();
  ctx.strokeStyle=darken(c,30);ctx.stroke();
  // Top face
  ctx.fillStyle=lighten(c,45);ctx.beginPath();
  ctx.moveTo(ttl.x,ttl.y);ctx.lineTo(ttr.x,ttr.y);ctx.lineTo(tbr.x,tbr.y);ctx.lineTo(tbl.x,tbl.y);ctx.closePath();ctx.fill();
  ctx.strokeStyle=lighten(c,60);ctx.stroke();
  ctx.globalAlpha=1;
}

function drawBlock(x,y,t,sz){
  var c=COLORS[t]||"#333";
  if(t===2)drawCube(x,y,0,"#d42020",sz||0.75);
  else if(t===3)drawCube(x,y,0,"#2a1550",sz||0.8);
  else if(t===4)drawCube(x,y,0,"#1a1a24",sz||0.9);
  else drawCube(x,y,0,c,sz||0.8);
}

function drawTNTEntity(e){
  var p=iso(e.x,e.y,0.7),s=S.cs*zoom*0.4;
  var flicker=0.6+0.4*Math.sin(tc*0.5+e.id);
  ctx.globalAlpha=flicker;
  ctx.fillStyle="#fff";ctx.fillRect(p.x-s,p.y-s,s*2,s*2);
  ctx.strokeStyle="#f44";ctx.lineWidth=2;ctx.strokeRect(p.x-s,p.y-s,s*2,s*2);
  ctx.fillStyle="#000";ctx.font=(12*zoom)+"px monospace";ctx.textAlign="center";ctx.fillText(e.f,p.x,p.y+4*zoom);
  ctx.globalAlpha=1;
}

function drawParticle(p){
  var pos=iso(p.x,p.y+p.vz*0.05,0);
  var a=p.life/p.ml,r=3*zoom*a;
  ctx.globalAlpha=a;
  ctx.fillStyle="hsl("+(15+Math.random()*35)+",100%,55%)";
  ctx.beginPath();ctx.arc(pos.x,pos.y,r,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
}

function drawGrid(){
  if(!S.grid)return;
  ctx.strokeStyle="rgba(30,30,44,0.3)";ctx.lineWidth=0.5;
  for(var z=0;z<=S.gh;z++){var a=iso(0,z,0),b=iso(S.gw,z,0);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
  for(var x=0;x<=S.gw;x++){var a=iso(x,0,0),b=iso(x,S.gh,0);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke()}
}

function render(){
  cv.width=innerWidth;cv.height=innerHeight;
  ctx.fillStyle="#0a0a0c";ctx.fillRect(0,0,cv.width,cv.height);

  // Center camera on grid
  var cc=iso(S.gw/2,S.gh/2,0);
  tcx=-cc.x+cv.width/2;tcy=-cc.y+cv.height/2;
  cx+=(tcx-cx)*0.15;cy+=(tcy-cy)*0.15;

  drawGrid();

  // Draw blocks (back to front for proper z-ordering)
  for(var y=0;y<S.gh;y++)for(var x=0;x<S.gw;x++){
    if(grid[y][x]!==0)drawBlock(x,y,grid[y][x]);
  }

  // TNT entities
  for(var i=0;i<ent.length;i++){if(ent[i].a)drawTNTEntity(ent[i])}

  // Particles
  for(var i=0;i<par.length;i++)drawParticle(par[i]);

  // Brush preview
  if(!rmbDown&&!lmbDown&&mouseOnGrid){
    var bs=S.brush;
    for(var dy=-bs+1;dy<bs;dy++)for(var dx=-bs+1;dx<bs;dx++){
      var px=gx+dx,pz=gy+dy;if(!ib(px,pz))continue;
      var p=iso(px+0.5,pz+0.5,0.01);
      ctx.fillStyle="rgba(255,255,255,0.15)";
      var s=S.cs*zoom*0.4;ctx.fillRect(p.x-s,p.y-s,s*2,s*2);
    }
  }

  // HUD update
  var ac=0;for(var i=0;i<ent.length;i++)if(ent[i].a)ac++;
  document.getElementById("sa").textContent=ac;
  document.getElementById("sd").textContent=tdet;
  document.getElementById("sm").textContent=mspt.toFixed(2);
  document.getElementById("sf").textContent=S.fuse;
}

// Input
var mx=0,my=0,gx=-1,gy=-1,mouseOnGrid=false;
var lmbDown=false,rmbDown=false,mmbDown=false,lastGP=null;

function screenToGrid(sx,sy){
  // Inverse isometric - rough approximation
  var wx=(sx-cx)/(COSA*S.cs*zoom);
  var wy=(sy-cy)/(SINA*S.cs*zoom);
  var gx0=Math.floor((wx+wy)/2);
  var gy0=Math.floor((wy-wx)/2*-1);
  return{gx:gx0,gy:gy0};
}

cv.addEventListener("mousemove",function(e){
  mx=e.clientX;my=e.clientY;
  var g=screenToGrid(mx-cv.offsetLeft,my-cv.offsetTop);
  gx=g.gx;gy=g.gy;mouseOnGrid=ib(gx,gy);
  if(lmbDown&&mouseOnGrid){var k=gx+","+gy;if(k!==lastGP){lastGP=k;pbr(gx,gy,cb)}}
  else if(rmbDown&&mouseOnGrid){var k=gx+","+gy;if(k!==lastGP){lastGP=k;rb(gx,gy)}}
});
cv.addEventListener("mousedown",function(e){
  if(e.button===0){lmbDown=true;if(mouseOnGrid){lastGP=gx+","+gy;pbr(gx,gy,cb)}}
  else if(e.button===2){rmbDown=true;if(mouseOnGrid){lastGP=gx+","+gy;rb(gx,gy)}}
  else if(e.button===1){e.preventDefault();if(mouseOnGrid)prime(gx,gy)}
});
cv.addEventListener("mouseup",function(e){if(e.button===0)lmbDown=false;if(e.button===2)rmbDown=false;lastGP=null});
cv.addEventListener("wheel",function(e){e.preventDefault();zoom*=(1-e.deltaY*0.001);zoom=Math.max(0.3,Math.min(4,zoom))},{passive:false});
cv.addEventListener("contextmenu",function(e){e.preventDefault()});

window.addEventListener("keydown",function(e){
  keys[e.key.toLowerCase()]=true;
  if(document.getElementById("so").classList.contains("on")){if(e.key==="Escape")cs();return}
  switch(e.key.toLowerCase()){
    case " ":e.preventDefault();run=!run;document.getElementById("brun").textContent=run?"⏸ PAUSE":"▶ RUN";break;
    case "r":reset();break;
    case "g":S.grid=!S.grid;break;
    case "h":hp.style.display=hp.style.display==="none"?"block":"none";break;
    case "1":cb=1;utb();break;case "2":cb=2;utb();break;case "3":cb=3;utb();break;case "4":cb=4;utb();break;
    case "[":S.brush=Math.max(1,S.brush-1);break;
    case "]":S.brush=Math.min(5,S.brush+1);break;
    case "=":case "+":S.ivl=Math.max(0.03,S.ivl-0.1);break;
    case "-":S.ivl=Math.min(2,S.ivl+0.1);break;
    case ".":if(!run)tick();break;
  }
});
window.addEventListener("keyup",function(e){keys[e.key.toLowerCase()]=false});
function utb(){var bs=document.querySelectorAll(".tb[data-blk]");for(var i=0;i<bs.length;i++)bs[i].classList.toggle("a",parseInt(bs[i].dataset.blk)===cb)}

// Toolbar
document.querySelectorAll(".tb[data-blk]").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".tb[data-blk]").forEach(function(bb){bb.classList.remove("a")});b.classList.add("a");cb=parseInt(b.dataset.blk)})});
document.getElementById("brun").addEventListener("click",function(){run=!run;document.getElementById("brun").textContent=run?"⏸ PAUSE":"▶ RUN"});
document.getElementById("brst").addEventListener("click",reset);
document.getElementById("bh").addEventListener("click",function(){hp.style.display=hp.style.display==="none"?"block":"none"});

// Settings
var SC=[{k:"pwr",l:"TNT Power",t:"s",n:1,x:10,s:0.5},{k:"fuse",l:"Fuse Time",t:"s",n:1,x:10,s:1,u:" ticks"},{k:"ivl",l:"Tick Speed",t:"s",n:0.03,x:2,s:0.01,u:"s",f:function(v){return v.toFixed(2)}},{k:"chain",l:"Chain Reaction",t:"t"},{k:"brush",l:"Brush Size",t:"s",n:1,x:5,s:1},{k:"grid",l:"Show Grid",t:"t"},{k:"gw",l:"Grid Width",t:"n",n:10,x:100,rb:true},{k:"gh",l:"Grid Height",t:"n",n:10,x:80,rb:true}];
function bsu(){
  var b=document.getElementById("sb"),h="";
  for(var i=0;i<SC.length;i++){
    var c=SC[i],v=S[c.k];
    if(c.t==="s"){h+='<div class="sr"><span class="sl">'+c.l+'</span><span class="sv" id="sv-'+c.k+'">'+(c.f?c.f(v):v)+(c.u||"")+'</span></div><input type="range" id="si-'+c.k+'" min="'+c.n+'" max="'+c.x+'" step="'+c.s+'" value="'+v+'">'}
    else if(c.t==="t"){h+='<div class="sr"><span class="sl">'+c.l+'</span><button class="st'+(v?" on":"")+'" id="si-'+c.k+'"></button></div>'}
    else{h+='<div class="sr"><span class="sl">'+c.l+'</span><input type="number" class="sn" id="si-'+c.k+'" min="'+c.n+'" max="'+c.x+'" value="'+v+'"></div>'}
  }
  b.innerHTML=h;
  for(var i=0;i<SC.length;i++){
    var c=SC[i];
    if(c.t==="s"){(function(c){var inp=document.getElementById("si-"+c.k),dsp=document.getElementById("sv-"+c.k);if(!inp||!dsp)return;inp.addEventListener("input",function(){var v=parseFloat(inp.value);dsp.textContent=(c.f?c.f(v):v)+(c.u||"");S[c.k]=v;if(c.rb)nrb=true})})(c)}
    else if(c.t==="t"){(function(c){var btn=document.getElementById("si-"+c.k);if(!btn)return;btn.addEventListener("click",function(){S[c.k]=!S[c.k];btn.classList.toggle("on",S[c.k])})})(c)}
    else{(function(c){var inp=document.getElementById("si-"+c.k);if(!inp)return;inp.addEventListener("input",function(){var v=parseInt(inp.value);if(!isNaN(v)&&v>=c.n&&v<=c.x){S[c.k]=v;if(c.rb)nrb=true}})})(c)}
  }
}
function os(){bsu();document.getElementById("so").classList.add("on")}
function cs(){document.getElementById("so").classList.remove("on")}
function as(){cs();if(nrb){initGrid();nrb=false}}
document.getElementById("bset").addEventListener("click",os);
document.getElementById("bsc").addEventListener("click",cs);
document.getElementById("bap").addEventListener("click",as);
document.getElementById("bra").addEventListener("click",function(){Object.assign(S,JSON.parse(JSON.stringify(DF)));bsu()});
document.getElementById("so").addEventListener("click",function(e){if(e.target===e.currentTarget)cs()});

// Main loop
var lastTime=0,fc=0,ft=0,cfps=60;
function anim(timestamp){
  requestAnimationFrame(anim);
  var dt=Math.min((timestamp-lastTime)/1000,0.1);lastTime=timestamp;
  fc++;ft+=dt;if(ft>=0.5){cfps=Math.round(fc/ft);fc=0;ft=0}
  document.getElementById("sps").textContent=cfps;

  // WASD panning
  var spd=400*dt;var f=COSA>0?1:1,r=COSA>0?1:1;
  if(keys["w"]||keys["arrowup"]){cy+=spd}
  if(keys["s"]||keys["arrowdown"]){cy-=spd}
  if(keys["a"]||keys["arrowleft"]){cx+=spd}
  if(keys["d"]||keys["arrowright"]){cx-=spd}

  if(run){tt+=dt;while(tt>=S.ivl){tt-=S.ivl;tick()}}else upParts(dt);
  render();
}
initGrid();
for(var x=14;x<=26;x++)for(var y=12;y<=20;y++){if(Math.random()<0.5)pb(x,y,1)}
pb(18,10,2);pb(20,10,2);pb(22,10,2);
prime(18,10);prime(20,10);prime(22,10);
hp.style.display="block";
anim(0);
</script></body></html>
